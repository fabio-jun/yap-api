services:
    postgres:                                                                                                      
      image: postgres:16
      container_name: blog_postgres
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: blogdb
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

    redis:
      image: redis:7-alpine
      container_name: blog_redis
      ports:
        - "6379:6379"

volumes:
  postgres_data:
